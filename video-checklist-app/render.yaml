services:
  - type: web
    name: video-checklist-app
    env: static
    staticPublishPath: ./build
    buildCommand: npm run build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 18 # Or your preferred Node.js version compatible with Create React App
      - key: CI
        value: false # To prevent create-react-app treating warnings as errors on build
      - key: GENERATE_SOURCEMAP # Optional: to prevent sourcemaps from being generated
        value: false
